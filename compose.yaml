services:
  postgres:
    image: postgres:17-alpine
    container_name: band_schedule_postgres
    environment:
      POSTGRES_DB: band_schedule
      POSTGRES_USER: band_schedule
      POSTGRES_PASSWORD: band_schedule
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U band_schedule -d band_schedule"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
